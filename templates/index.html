<!DOCTYPE html>
<html lang="zh-Hant" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多功能線上壓縮工具</title>
    
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .log-box { font-family: 'Courier New', Courier, monospace; }
        .tab-button { transition: all 0.3s; padding: 0.75rem 0.25rem; border-bottom-width: 2px; font-size: 0.875rem; line-height: 1.25rem; font-weight: 500; white-space: nowrap; border-color: transparent;}
        .tab-button.active { border-color: #3b82f6; color: #3b82f6; }
        .dark .tab-button.active { background-color: #1e3a8a; color: #e0f2fe;}
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .drop-zone {
            border: 2px dashed #9ca3af;
            transition: all 0.3s;
        }
        .dark .drop-zone { border-color: #4b5563; }
        .drop-zone.drag-over {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        .dark .drop-zone.drag-over { background-color: #1e3a8a; }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex; align-items: center; justify-content: center;
            z-index: 50;
            opacity: 0; transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .modal-overlay.visible { opacity: 1; pointer-events: auto; }
        .modal-content {
            background-color: white; padding: 2rem; border-radius: 0.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.95); transition: transform 0.3s ease;
        }
        .dark .modal-content { background-color: #1f2937; }
        .modal-overlay.visible .modal-content { transform: scale(1); }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-300 transition-colors duration-300">

    <div class="container mx-auto p-4 md:p-8 max-w-4xl">
        <header class="text-center mb-8 relative">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white">多功能線上壓縮工具</h1>
            <p class="text-gray-600 dark:text-gray-400 mt-2">安全地對您的檔案進行多層壓縮與解壓縮。</p>
            
            <button id="theme-toggle" type="button" class="absolute top-0 right-0 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-700 rounded-lg text-sm p-2.5">
                <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 14.464A1 1 0 106.465 13.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 11a1 1 0 100-2H4a1 1 0 100 2h1zM4.54 5.46A1 1 0 015.95 6.874l-.707.707a1 1 0 11-1.414-1.414l.707-.707z"></path></svg>
            </button>
        </header>

        <main class="bg-white rounded-lg shadow-lg p-6 md:p-8 dark:bg-gray-800">
            <div id="main-view">
                <div class="mb-6 border-b border-gray-200 dark:border-gray-700">
                    <nav class="-mb-px flex space-x-6" aria-label="Tabs">
                        <button id="tab-compress" class="tab-button active">壓縮</button>
                        <button id="tab-decompress" class="tab-button text-gray-500 dark:text-gray-400">解壓縮</button>
                        <button id="tab-history" class="tab-button text-gray-500 dark:text-gray-400">歷史紀錄</button>
                    </nav>
                </div>
                
                <div id="compress-section">
                    <form id="compress-form">
                        <fieldset class="space-y-4">
                            <div id="drop-zone-compress" class="drop-zone rounded-lg p-8 text-center cursor-pointer">
                                <input id="file-compress" name="file" type="file" required class="hidden">
                                <label for="file-compress" class="cursor-pointer">
                                    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true"><path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                    <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                                        <span class="font-medium text-blue-600 dark:text-blue-400">點擊此處上傳檔案</span>
                                        或將檔案拖曳至此
                                    </p>
                                    <p id="file-name-display-compress" class="mt-1 text-xs text-gray-500"></p>
                                </label>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4">
                                <div>
                                    <label for="iterations" class="block text-sm font-medium text-gray-700 dark:text-gray-300">壓縮次數:</label>
                                    <input type="number" id="iterations" name="iterations" value="5" min="1" max="100" class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                                </div>
                                <div>
                                    <label for="formats" class="block text-sm font-medium text-gray-700 dark:text-gray-300">格式順序:</label>
                                    <input type="text" id="formats" name="formats" value="zip,7z,targz" class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">一般加密規則:</label>
                                <div class="space-y-2">
                                    <div class="flex items-center"><input id="encrypt-odd" name="encrypt_mode" type="radio" value="odd" checked class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600"><label for="encrypt-odd" class="ml-3 block text-sm text-gray-900 dark:text-gray-300">加密所有奇數層 (1, 3, 5...)</label></div>
                                    <div class="flex items-center"><input id="encrypt-manual" name="encrypt_mode" type="radio" value="manual" class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600"><label for="encrypt-manual" class="ml-3 block text-sm text-gray-900 dark:text-gray-300">手動指定層數:</label><input type="text" id="manual_layers" name="manual_layers" placeholder="例如: 2,4" class="ml-2 block w-full md:w-auto rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                                </div>
                            </div>
                        </fieldset>
                        <fieldset id="master-password-fieldset" class="mt-6 border-t pt-4 space-y-4 dark:border-gray-700">
                             <legend class="text-sm font-medium text-gray-700 dark:text-gray-300">特殊加密設定 (選填)</legend>
                            <div class="flex items-start">
                                 <div class="flex items-center h-5">
                                    <input id="use_master_pass" name="use_master_pass" type="checkbox" class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600">
                                </div>
                                <div class="ml-3 text-sm">
                                    <label for="use_master_pass" class="font-medium text-gray-800 dark:text-gray-200">啟用特殊密碼</label>
                                    <p class="text-gray-500 dark:text-gray-400">在固定間隔使用您指定的密碼進行加密。</p>
                                </div>
                            </div>
                            <div id="master-password-inputs" class="space-y-4 hidden">
                                 <div>
                                    <label for="master_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">您的特殊密碼:</label>
                                    <input type="password" id="master_password" name="master_password" class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                                </div>
                                <div>
                                    <label for="master_password_interval" class="block text-sm font-medium text-gray-700 dark:text-gray-300">間隔層數 (每 N 層使用一次):</label>
                                    <input type="number" id="master_password_interval" name="master_password_interval" value="10" min="2" class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                                </div>
                            </div>
                        </fieldset>
                        <div class="mt-6 text-center"><button type="submit" class="w-full md:w-auto inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-transform transform hover:scale-105 dark:focus:ring-blue-800">開始壓縮</button></div>
                    </form>
                </div>
                <div id="decompress-section" class="hidden">
                    <form id="decompress-form">
                        <fieldset class="space-y-4">
                            <div id="drop-zone-decompress" class="drop-zone rounded-lg p-8 text-center cursor-pointer">
                                <input id="file-decompress" name="file" type="file" required class="hidden">
                                <label for="file-decompress" class="cursor-pointer">
                                    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true"><path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                    <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                                        <span class="font-medium text-blue-600 dark:text-blue-400">點擊選擇要解壓縮的檔案</span>
                                        或將檔案拖曳至此
                                    </p>
                                    <p id="file-name-display-decompress" class="mt-1 text-xs text-gray-500"></p>
                                </label>
                            </div>
                            <div>
                               <label for="passwords" class="block text-sm font-medium text-gray-700 dark:text-gray-300">密碼表:</label>
                               <textarea id="passwords" name="passwords" rows="4" required class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500" placeholder="請將 passwords.txt 的內容完整貼於此處..."></textarea>
                            </div>
                            <div>
                               <label for="decompress_master_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">特殊密碼 (選填):</label>
                               <input type="password" id="decompress_master_password" name="master_password" class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500" placeholder="若檔案需要特殊密碼，請在此輸入">
                            </div>
                        </fieldset>
                        <div class="mt-6 text-center"><button type="submit" class="w-full md:w-auto inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition-transform transform hover:scale-105 dark:focus:ring-green-800">開始解壓縮</button></div>
                    </form>
                </div>
                <div id="history-section" class="hidden">
                     <div class="flex justify-between items-center mb-4">
                         <h2 class="text-lg font-medium text-gray-900 dark:text-white">本機壓縮歷史</h2>
                         <div class="flex gap-2">
                            <button id="cleanup-orphans-btn" class="text-sm text-yellow-600 hover:text-yellow-800 dark:text-yellow-400 dark:hover:text-yellow-300">倉庫大掃除 (管理員)</button>
                            <button id="clear-history-btn" class="text-sm text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300">清除所有紀錄</button>
                         </div>
                     </div>
                     <div id="history-list" class="space-y-3">
                         <!-- JS will populate this -->
                     </div>
                </div>
            </div>
            
            <div id="progress-section" class="hidden fade-in mt-8">
                 <h2 class="text-2xl font-semibold mb-4 border-b pb-2 dark:border-gray-700">處理進度</h2>
                 <div class="mb-4">
                    <div class="flex justify-between mb-1"><span id="progress-status" class="text-base font-medium text-gray-700 dark:text-gray-300">處理中...</span><span id="progress-percentage" class="text-sm font-medium text-gray-700 dark:text-gray-300">0%</span></div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5 dark:bg-gray-700"><div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div></div>
                 </div>
                 <div class="text-center my-4"><button id="cancel-button" class="hidden w-full md:w-auto inline-flex justify-center items-center px-4 py-2 border border-red-300 text-sm font-medium rounded-md shadow-sm text-red-700 bg-red-100 hover:bg-red-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 dark:bg-red-900 dark:text-red-300 dark:border-red-700 dark:hover:bg-red-800">取消操作</button></div>
                 <div class="mt-4"><label for="log-box" class="block text-sm font-medium text-gray-700 dark:text-gray-300">執行日誌:</label><div id="log-box" class="log-box mt-1 h-48 bg-gray-900 text-white text-sm rounded-md p-3 overflow-y-auto whitespace-pre-wrap dark:bg-black dark:text-gray-300"></div></div>
                 <div id="result-section" class="hidden fade-in mt-6 p-4 bg-blue-50 rounded-lg text-center dark:bg-gray-900">
                    <h3 id="result-title" class="text-lg font-medium text-blue-800 dark:text-blue-300">任務完成！</h3>
                    <div id="result-buttons" class="mt-4 flex flex-wrap justify-center items-center gap-4"></div>
                 </div>
            </div>

            <div id="share-view-section" class="hidden">
                 <h2 class="text-2xl font-semibold mb-2 text-gray-900 dark:text-white">一鍵解壓縮分享</h2>
                 <p class="text-gray-600 dark:text-gray-400 mb-6" id="share-filename">正在準備檔案...</p>
                 <div id="share-master-pass-prompt" class="hidden mb-4 p-4 bg-yellow-50 border-l-4 border-yellow-400 dark:bg-yellow-900 dark:border-yellow-600">
                    <label for="share-master-password" class="block text-sm font-medium text-yellow-800 dark:text-yellow-200">⚠️ 此檔案需要特殊密碼</label>
                    <p class="text-sm text-yellow-700 dark:text-yellow-300 mt-1">請向分享者索取，並在此輸入：</p>
                    <input type="password" id="share-master-password" class="mt-2 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-yellow-500 focus:ring-yellow-500">
                 </div>
                 <div class="text-center"><button id="start-share-decompress-btn" class="w-full inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-green-600 hover:bg-green-700 dark:focus:ring-green-800"><svg class="w-5 h-5 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm.75-13a.75.75 0 00-1.5 0v5.5a.75.75 0 00.22.53l2.5 2.5a.75.75 0 001.06-1.06L10.75 10.19V5z" clip-rule="evenodd"></path></svg>開始解壓縮並準備下載</button></div>
            </div>
        </main>
        <footer class="text-center mt-8 text-sm text-gray-500 dark:text-gray-400">
             <p>所有檔案將永久儲存於 MongoDB 資料庫中。</p>
             <div id="storage-stats-container" class="max-w-xs mx-auto mt-4">
                 <div class="flex justify-between text-xs font-medium text-gray-600 dark:text-gray-400">
                    <span class="font-bold">資料庫儲存空間 (免費額度: 512MB)</span>
                    <span id="storage-text">正在計算...</span>
                 </div>
                 <div class="w-full bg-gray-200 rounded-full h-2 mt-1 dark:bg-gray-700">
                     <div id="storage-bar" class="bg-indigo-500 h-2 rounded-full" style="width: 0%"></div>
                 </div>
             </div>
        </footer>
    </div>
    
    <div id="qrcode-modal" class="modal-overlay">
         <div class="modal-content text-center"><h3 class="text-lg font-medium leading-6 text-gray-900 dark:text-white mb-4">手機掃描分享</h3><div id="qrcode-container" class="p-2 border rounded-lg inline-block bg-white"></div><p class="text-sm text-gray-500 dark:text-gray-400 mt-2">使用手機相機掃描以上 QR Code</p><div class="mt-6"><button id="close-modal-btn" type="button" class="inline-flex justify-center rounded-md border border-gray-300 dark:border-gray-500 bg-white dark:bg-gray-700 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300 shadow-sm hover:bg-gray-50 dark:hover:bg-gray-600">關閉</button></div></div>
    </div>

    <div id="delete-confirm-modal" class="modal-overlay">
        <div class="modal-content text-center"><div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-red-100 dark:bg-red-900"><svg class="h-6 w-6 text-red-600 dark:text-red-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"></path></svg></div><h3 class="text-lg font-medium leading-6 text-gray-900 dark:text-white mt-4">永久刪除檔案</h3><p class="text-sm text-gray-500 dark:text-gray-400 mt-2">您確定要刪除這個檔案嗎？<br>此操作無法復原，分享連結將會失效。</p><div class="mt-6 flex justify-center gap-4"><button id="cancel-delete-btn" class="rounded-md border border-gray-300 dark:border-gray-500 bg-white dark:bg-gray-700 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300">取消</button><button id="confirm-delete-btn" class="rounded-md bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700">確認刪除</button></div></div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const elements = {
                mainView: document.getElementById('main-view'),
                progressSection: document.getElementById('progress-section'),
                shareView: document.getElementById('share-view-section'),
                compressForm: document.getElementById('compress-form'),
                decompressForm: document.getElementById('decompress-form'), 
                cancelButton: document.getElementById('cancel-button'),
                logBox: document.getElementById('log-box'),
                progressBar: document.getElementById('progress-bar'),
                progressPercentage: document.getElementById('progress-percentage'),
                progressStatus: document.getElementById('progress-status'),
                resultSection: document.getElementById('result-section'),
                resultTitle: document.getElementById('result-title'),
                resultButtons: document.getElementById('result-buttons'),
                useMasterPassCheckbox: document.getElementById('use_master_pass'),
                masterPassInputs: document.getElementById('master-password-inputs'),
                tabs: { compress: document.getElementById('tab-compress'), decompress: document.getElementById('tab-decompress'), history: document.getElementById('tab-history') },
                sections: { compress: document.getElementById('compress-section'), decompress: document.getElementById('decompress-section'), history: document.getElementById('history-section') },
                dropZoneCompress: document.getElementById('drop-zone-compress'), 
                fileInputCompress: document.getElementById('file-compress'), 
                fileNameDisplayCompress: document.getElementById('file-name-display-compress'), 
                dropZoneDecompress: document.getElementById('drop-zone-decompress'), 
                fileInputDecompress: document.getElementById('file-decompress'), 
                fileNameDisplayDecompress: document.getElementById('file-name-display-decompress'), 
                historyList: document.getElementById('history-list'),
                clearHistoryBtn: document.getElementById('clear-history-btn'),
                cleanupOrphansBtn: document.getElementById('cleanup-orphans-btn'),
                deleteConfirmModal: document.getElementById('delete-confirm-modal'),
                cancelDeleteBtn: document.getElementById('cancel-delete-btn'),
                confirmDeleteBtn: document.getElementById('confirm-delete-btn'),
                qrCodeModal: document.getElementById('qrcode-modal'),
                qrCodeContainer: document.getElementById('qrcode-container'),
                closeModalBtn: document.getElementById('close-modal-btn'),
                themeToggleBtn: document.getElementById('theme-toggle'),
                themeToggleDarkIcon: document.getElementById('theme-toggle-dark-icon'),
                themeToggleLightIcon: document.getElementById('theme-toggle-light-icon'),
                share: {
                    filename: document.getElementById('share-filename'),
                    masterPassPrompt: document.getElementById('share-master-pass-prompt'),
                    masterPassInput: document.getElementById('share-master-password'),
                    startBtn: document.getElementById('start-share-decompress-btn')
                },
                storage: {
                    bar: document.getElementById('storage-bar'),
                    text: document.getElementById('storage-text')
                }
            };
            let currentTaskId = null;
            let taskToDelete = null;

            // --- 事件監聽 ---
            Object.keys(elements.tabs).forEach(mode => {
                elements.tabs[mode].addEventListener('click', () => {
                    Object.keys(elements.tabs).forEach(m => {
                        elements.tabs[m].classList.toggle('active', m === mode);
                        elements.sections[m].classList.toggle('hidden', m !== mode);
                    });
                    if (mode === 'history') renderHistory();
                });
            });

            function setupDropZone(dropZone, fileInput, fileNameDisplay) {

                    updateStorageStats();

                    alert(`清除失敗: ${error.message}`);
