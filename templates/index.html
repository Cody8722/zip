<!DOCTYPE html>
<html lang="zh-Hant" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多功能線上壓縮工具</title>
    
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .log-box { font-family: 'Courier New', Courier, monospace; }
        .tab-button { transition: all 0.3s; }
        .tab-button.active { border-color: #3b82f6; color: #3b82f6; }
        .dark .tab-button.active { background-color: #1e3a8a; color: #e0f2fe;}
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* *** 關鍵修改：新增拖曳區塊樣式 *** */
        .drop-zone {
            border: 2px dashed #9ca3af; /* gray-400 */
            transition: all 0.3s;
        }
        .dark .drop-zone { border-color: #4b5563; /* gray-600 */ }
        .drop-zone.drag-over {
            border-color: #3b82f6; /* blue-500 */
            background-color: #eff6ff; /* blue-50 */
        }
        .dark .drop-zone.drag-over { background-color: #1e3a8a; }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex; align-items: center; justify-content: center;
            z-index: 50;
            opacity: 0; transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .modal-overlay.visible { opacity: 1; pointer-events: auto; }
        .modal-content {
            background-color: white; padding: 2rem; border-radius: 0.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.95); transition: transform 0.3s ease;
        }
        .dark .modal-content { background-color: #1f2937; }
        .modal-overlay.visible .modal-content { transform: scale(1); }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-300 transition-colors duration-300">

    <div class="container mx-auto p-4 md:p-8 max-w-4xl">
        <header class="text-center mb-8 relative">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 dark:text-white">多功能線上壓縮工具</h1>
            <p class="text-gray-600 dark:text-gray-400 mt-2">安全地對您的檔案進行多層壓縮與解壓縮。</p>
            
            <button id="theme-toggle" type="button" class="absolute top-0 right-0 text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-700 rounded-lg text-sm p-2.5">
                <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 14.464A1 1 0 106.465 13.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 11a1 1 0 100-2H4a1 1 0 100 2h1zM4.54 5.46A1 1 0 015.95 6.874l-.707.707a1 1 0 11-1.414-1.414l.707-.707z"></path></svg>
            </button>
        </header>

        <main class="bg-white rounded-lg shadow-lg p-6 md:p-8 dark:bg-gray-800">
            <div id="main-view">
                <div class="mb-6 border-b border-gray-200 dark:border-gray-700">
                    <nav class="-mb-px flex space-x-6" aria-label="Tabs">
                        <button id="tab-compress" class="tab-button active">壓縮</button>
                        <button id="tab-history" class="tab-button">歷史紀錄</button>
                    </nav>
                </div>
                
                <div id="compress-section">
                    <form id="compress-form">
                        <fieldset class="space-y-4">
                            <!-- *** 關鍵修改：新增拖曳上傳區塊 *** -->
                            <div id="drop-zone" class="drop-zone rounded-lg p-8 text-center cursor-pointer">
                                <input id="file-compress" name="file" type="file" required class="hidden">
                                <label for="file-compress" class="cursor-pointer">
                                    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true"><path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                                    <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                                        <span class="font-medium text-blue-600 dark:text-blue-400">點擊此處上傳檔案</span>
                                        或將檔案拖曳至此
                                    </p>
                                    <p id="file-name-display" class="mt-1 text-xs text-gray-500"></p>
                                </label>
                            </div>
                            <!-- (其他壓縮設定不變) -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4">
                                <div>
                                    <label for="iterations" class="block text-sm font-medium text-gray-700 dark:text-gray-300">壓縮次數:</label>
                                    <input type="number" id="iterations" name="iterations" value="5" min="1" max="100" class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                                </div>
                                <div>
                                    <label for="formats" class="block text-sm font-medium text-gray-700 dark:text-gray-300">格式順序:</label>
                                    <input type="text" id="formats" name="formats" value="zip,7z,targz" class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">一般加密規則:</label>
                                <div class="space-y-2">
                                    <div class="flex items-center"><input id="encrypt-odd" name="encrypt_mode" type="radio" value="odd" checked class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600"><label for="encrypt-odd" class="ml-3 block text-sm text-gray-900 dark:text-gray-300">加密所有奇數層 (1, 3, 5...)</label></div>
                                    <div class="flex items-center"><input id="encrypt-manual" name="encrypt_mode" type="radio" value="manual" class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600"><label for="encrypt-manual" class="ml-3 block text-sm text-gray-900 dark:text-gray-300">手動指定層數:</label><input type="text" id="manual_layers" name="manual_layers" placeholder="例如: 2,4" class="ml-2 block w-full md:w-auto rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                                </div>
                            </div>
                        </fieldset>
                        <fieldset id="master-password-fieldset" class="mt-6 border-t pt-4 space-y-4 dark:border-gray-700">
                             <legend class="text-sm font-medium text-gray-700 dark:text-gray-300">特殊加密設定 (選填)</legend>
                            <div class="flex items-start">
                                 <div class="flex items-center h-5">
                                    <input id="use_master_pass" name="use_master_pass" type="checkbox" class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600">
                                </div>
                                <div class="ml-3 text-sm">
                                    <label for="use_master_pass" class="font-medium text-gray-800 dark:text-gray-200">啟用特殊密碼</label>
                                    <p class="text-gray-500 dark:text-gray-400">在固定間隔使用您指定的密碼進行加密。</p>
                                </div>
                            </div>
                            <div id="master-password-inputs" class="space-y-4 hidden">
                                 <div>
                                    <label for="master_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">您的特殊密碼:</label>
                                    <input type="password" id="master_password" name="master_password" class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                                </div>
                                <div>
                                    <label for="master_password_interval" class="block text-sm font-medium text-gray-700 dark:text-gray-300">間隔層數 (每 N 層使用一次):</label>
                                    <input type="number" id="master_password_interval" name="master_password_interval" value="10" min="2" class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                                </div>
                            </div>
                        </fieldset>
                        <div class="mt-6 text-center"><button type="submit" class="w-full md:w-auto inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-transform transform hover:scale-105 dark:focus:ring-blue-800">開始壓縮</button></div>
                    </form>
                </div>
                <!-- *** 關鍵修改：新增歷史紀錄區塊 *** -->
                <div id="history-section" class="hidden">
                     <div class="flex justify-between items-center mb-4">
                         <h2 class="text-lg font-medium text-gray-900 dark:text-white">本機壓縮歷史</h2>
                         <button id="clear-history-btn" class="text-sm text-red-500 hover:text-red-700">清除所有紀錄</button>
                     </div>
                     <div id="history-list" class="space-y-3">
                         <!-- JS will populate this -->
                     </div>
                </div>
            </div>
            
            <div id="progress-section" class="hidden fade-in mt-8">
                 <!-- (進度條區塊不變) -->
            </div>

            <div id="share-view-section" class="hidden">
                 <!-- (分享頁面區塊不變) -->
            </div>
        </main>
        <footer class="text-center mt-8 text-sm text-gray-500 dark:text-gray-400">
             <p>所有檔案將永久儲存於 MongoDB 資料庫中。</p>
             <div id="storage-stats-container" class="max-w-xs mx-auto mt-4">
                 <div class="flex justify-between text-xs font-medium text-gray-600 dark:text-gray-400">
                    <span class="font-bold">資料庫儲存空間 (免費額度: 512MB)</span>
                    <span id="storage-text">正在計算...</span>
                 </div>
                 <div class="w-full bg-gray-200 rounded-full h-2 mt-1 dark:bg-gray-700">
                     <div id="storage-bar" class="bg-indigo-500 h-2 rounded-full" style="width: 0%"></div>
                 </div>
             </div>
        </footer>
    </div>
    
    <div id="qrcode-modal" class="modal-overlay">
         <!-- (QR Code 彈出視窗不變) -->
    </div>

    <!-- *** 關鍵修改：新增刪除確認彈出視窗 *** -->
    <div id="delete-confirm-modal" class="modal-overlay">
        <div class="modal-content text-center">
            <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-red-100">
                <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"></path></svg>
            </div>
            <h3 class="text-lg font-medium leading-6 text-gray-900 dark:text-white mt-4">永久刪除檔案</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">您確定要刪除這個檔案嗎？<br>此操作無法復原，分享連結將會失效。</p>
            <div class="mt-6 flex justify-center gap-4">
                <button id="cancel-delete-btn" class="rounded-md border border-gray-300 dark:border-gray-500 bg-white dark:bg-gray-700 px-4 py-2 text-sm font-medium text-gray-700 dark:text-gray-300">取消</button>
                <button id="confirm-delete-btn" class="rounded-md bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700">確認刪除</button>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const elements = {
                // ... (其他元素不變)
                // *** 關鍵修改：新增元素 ***
                tabs: { compress: document.getElementById('tab-compress'), history: document.getElementById('tab-history') },
                sections: { compress: document.getElementById('compress-section'), history: document.getElementById('history-section') },
                dropZone: document.getElementById('drop-zone'),
                fileInput: document.getElementById('file-compress'),
                fileNameDisplay: document.getElementById('file-name-display'),
                historyList: document.getElementById('history-list'),
                clearHistoryBtn: document.getElementById('clear-history-btn'),
                deleteConfirmModal: document.getElementById('delete-confirm-modal'),
                cancelDeleteBtn: document.getElementById('cancel-delete-btn'),
                confirmDeleteBtn: document.getElementById('confirm-delete-btn'),
            };
            let currentTaskId = null;
            let taskToDelete = null; // 用來儲存待刪除的任務資訊

            // --- 事件監聽 ---
            
            // *** 關鍵修改：更新分頁切換邏輯 ***
            Object.keys(elements.tabs).forEach(mode => {
                elements.tabs[mode].addEventListener('click', () => {
                    Object.keys(elements.tabs).forEach(m => {
                        elements.tabs[m].classList.toggle('active', m === mode);
                        elements.sections[m].classList.toggle('hidden', m !== mode);
                    });
                    if (mode === 'history') renderHistory();
                });
            });

            // *** 關鍵修改：新增拖曳上傳事件 ***
            const dropZone = elements.dropZone;
            const fileInput = elements.fileInput;
            const fileNameDisplay = elements.fileNameDisplay;

            dropZone.addEventListener('dragover', e => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });
            ['dragleave', 'dragend'].forEach(type => {
                dropZone.addEventListener(type, () => dropZone.classList.remove('drag-over'));
            });
            dropZone.addEventListener('drop', e => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                if (e.dataTransfer.files.length) {
                    fileInput.files = e.dataTransfer.files;
                    fileNameDisplay.textContent = fileInput.files[0].name;
                }
            });
            fileInput.addEventListener('change', () => {
                 if (fileInput.files.length > 0) {
                    fileNameDisplay.textContent = fileInput.files[0].name;
                }
            });
            
            // *** 關鍵修改：新增歷史紀錄與刪除事件 ***
            elements.clearHistoryBtn.addEventListener('click', () => {
                localStorage.removeItem('compressHistory');
                renderHistory();
            });
            elements.cancelDeleteBtn.addEventListener('click', () => elements.deleteConfirmModal.classList.remove('visible'));
            elements.confirmDeleteBtn.addEventListener('click', () => {
                if (taskToDelete) {
                    deleteFileFromServer(taskToDelete.id, taskToDelete.token);
                    taskToDelete = null;
                }
                elements.deleteConfirmModal.classList.remove('visible');
            });


            // --- (其他事件監聽不變) ---

            // --- 函式 ---
            
            // *** 關鍵修改：新增或修改的函式 ***

            function saveToHistory(taskData) {
                let history = JSON.parse(localStorage.getItem('compressHistory') || '[]');
                const newEntry = {
                    id: taskData._id,
                    name: taskData.params.raw_filename,
                    date: new Date().toLocaleString(),
                    finalName: taskData.result_filename,
                    token: taskData.delete_token
                };
                history.unshift(newEntry); // 加到最前面
                if(history.length > 50) history.pop(); // 最多保存50筆
                localStorage.setItem('compressHistory', JSON.stringify(history));
            }

            function renderHistory() {
                let history = JSON.parse(localStorage.getItem('compressHistory') || '[]');
                elements.historyList.innerHTML = '';
                if(history.length === 0) {
                    elements.historyList.innerHTML = `<p class="text-center text-gray-500 dark:text-gray-400">尚無任何壓縮紀錄。</p>`;
                    return;
                }
                history.forEach(item => {
                    const entry = document.createElement('div');
                    entry.className = 'p-3 bg-gray-50 dark:bg-gray-700 rounded-lg flex items-center justify-between';
                    entry.innerHTML = `
                        <div>
                            <p class="font-medium text-gray-900 dark:text-white">${item.name}</p>
                            <p class="text-sm text-gray-500 dark:text-gray-400">${item.date}</p>
                        </div>
                        <div class="flex gap-2">
                            <button data-id="${item.id}" class="history-share-btn text-sm text-blue-500 hover:underline">分享</button>
                            <button data-id="${item.id}" class="history-qr-btn text-sm text-green-500 hover:underline">QR Code</button>
                            <button data-id="${item.id}" data-token="${item.token}" class="history-delete-btn text-sm text-red-500 hover:underline">刪除</button>
                        </div>
                    `;
                    elements.historyList.appendChild(entry);
                });
            }

            // 使用事件委派來處理歷史紀錄中的按鈕點擊
            elements.historyList.addEventListener('click', (e) => {
                const target = e.target;
                const id = target.dataset.id;
                if (!id) return;

                if (target.classList.contains('history-share-btn')) {
                    // 這裡只是簡單地複製連結，可以做得更花俏
                    const shareUrl = `${window.location.origin}${window.location.pathname}?share_id=${id}`;
                    navigator.clipboard.writeText(shareUrl).then(() => {
                        target.textContent = '已複製!';
                        setTimeout(() => target.textContent = '分享', 2000);
                    });
                } else if (target.classList.contains('history-qr-btn')) {
                    showQrCode(id);
                } else if (target.classList.contains('history-delete-btn')) {
                    const token = target.dataset.token;
                    promptDeleteFile(id, token);
                }
            });

            function promptDeleteFile(taskId, token) {
                taskToDelete = { id: taskId, token: token };
                elements.deleteConfirmModal.classList.add('visible');
            }

            async function deleteFileFromServer(taskId, token) {
                try {
                    const response = await fetch(`/delete/${taskId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token })
                    });
                    const result = await response.json();
                    if (!response.ok) throw new Error(result.error);
                    
                    // 從歷史紀錄中移除
                    let history = JSON.parse(localStorage.getItem('compressHistory') || '[]');
                    history = history.filter(item => item.id !== taskId);
                    localStorage.setItem('compressHistory', JSON.stringify(history));
                    renderHistory();
                    updateStorageStats(); // 更新空間

                } catch (error) {
                    alert(`刪除失敗: ${error.message}`);
                }
            }
            
            // --- (其他函式不變，但 displayResults 有修改) ---
            function displayResults(data) {
                elements.resultButtons.innerHTML = '';
                const isCompress = data.type === 'compress';
                
                if (isCompress) {
                    saveToHistory(data);
                }
                
                if (!isCompress && data.result_file_id) {
                    elements.logBox.innerHTML += '\n\n日誌: 正在自動為您下載檔案...';
                    window.location.href = `/download/${data._id}`;
                }

                const downloadFileBtn = document.createElement('a');
                downloadFileBtn.href = `/download/${data._id}`;
                downloadFileBtn.textContent = `下載檔案 (${data.result_filename})`;
                downloadFileBtn.className = `w-full md:w-auto inline-flex items-center justify-center px-5 py-2 border border-transparent text-sm font-medium rounded-md text-white ${isCompress ? 'bg-blue-600' : 'bg-green-600'}`;
                elements.resultButtons.appendChild(downloadFileBtn);

                if (isCompress) {
                    updateStorageStats();
                    elements.resultSection.className = 'fade-in mt-6 p-4 bg-blue-50 rounded-lg text-center dark:bg-gray-900';
                    elements.resultTitle.className = 'text-lg font-medium text-blue-800 dark:text-blue-300';
                    
                    if (data.password_file_content) {
                        const shareBtn = document.createElement('button');
                        shareBtn.innerHTML = `產生分享連結`;
                        shareBtn.className = "w-full md:w-auto inline-flex items-center justify-center px-5 py-2 border border-transparent text-sm font-medium rounded-md text-yellow-800 bg-yellow-100 hover:bg-yellow-200 dark:text-yellow-200 dark:bg-yellow-900 dark:hover:bg-yellow-800";
                        shareBtn.onclick = (e) => displayShareLink(e, data);
                        elements.resultButtons.appendChild(shareBtn);
                        
                        const qrBtn = document.createElement('button');
                        qrBtn.innerHTML = `<svg class="w-5 h-5 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path d="M7 3.5A1.5 1.5 0 018.5 2h3A1.5 1.5 0 0113 3.5v3A1.5 1.5 0 0111.5 8h-3A1.5 1.5 0 017 6.5v-3zM8.5 3a.5.5 0 00-.5.5v3a.5.5 0 00.5.5h3a.5.5 0 00.5-.5v-3a.5.5 0 00-.5-.5h-3zM15 3.5A1.5 1.5 0 0116.5 2h.25a.75.75 0 010 1.5H17v.25a.75.75 0 01-1.5 0V4h-.25A1.5 1.5 0 0115 3.5zM7 15a1.5 1.5 0 011.5-1.5h3A1.5 1.5 0 0113 15v3a1.5 1.5 0 01-1.5 1.5h-3A1.5 1.5 0 017 18v-3zM8.5 14a.5.5 0 00-.5.5v3a.5.5 0 00.5.5h3a.5.5 0 00.5-.5v-3a.5.5 0 00-.5-.5h-3zM15 15a1.5 1.5 0 011.5-1.5h.25a.75.75 0 010 1.5H17v.25a.75.75 0 01-1.5 0V16h-.25A1.5 1.5 0 0115 15zM3.5 7A1.5 1.5 0 012 8.5v3A1.5 1.5 0 013.5 13h3A1.5 1.5 0 018 11.5v-3A1.5 1.5 0 016.5 7h-3zM3 8.5a.5.5 0 00-.5.5v3a.5.5 0 00.5.5h3a.5.5 0 00.5-.5v-3a.5.5 0 00-.5-.5h-3zM3.5 15A1.5 1.5 0 012 16.5v.25a.75.75 0 01-1.5 0V16a.75.75 0 01.75-.75h.25A1.5 1.5 0 013.5 15zm13.25.75a.75.75 0 00-1.5 0v.25A1.5 1.5 0 0113.5 18h-.25a.75.75 0 000 1.5h.25A2.75 2.75 0 0016 16.75v-.25a.75.75 0 00-.75-.75z"/></svg>顯示 QR Code`;
                        qrBtn.className = "w-full md:w-auto inline-flex items-center justify-center px-5 py-2 border border-transparent text-sm font-medium rounded-md text-gray-700 bg-gray-100 hover:bg-gray-200 dark:bg-gray-600 dark:text-gray-300 dark:hover:bg-gray-500";
                        qrBtn.onclick = () => showQrCode(data._id);
                        elements.resultButtons.appendChild(qrBtn);
                        
                        // *** 關鍵修改：新增刪除按鈕 ***
                        const deleteBtn = document.createElement('button');
                        deleteBtn.innerHTML = `<svg class="w-5 h-5 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 006 3.75v.443c-.795.077-1.58.22-2.365.468a.75.75 0 10.23 1.482l.149-.022.841 10.518A2.75 2.75 0 007.596 19h4.807a2.75 2.75 0 002.742-2.53l.841-10.52.149.023a.75.75 0 00.23-1.482A41.03 41.03 0 0014 4.193v-.443A2.75 2.75 0 0011.25 1h-2.5zM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4zM8.58 7.72a.75.75 0 00-1.5.06l.3 7.5a.75.75 0 101.5-.06l-.3-7.5zm4.34.06a.75.75 0 10-1.5-.06l-.3 7.5a.75.75 0 101.5.06l.3-7.5z" clip-rule="evenodd" /></svg>永久刪除此檔案`;
                        deleteBtn.className = "w-full md:w-auto inline-flex items-center justify-center px-5 py-2 border border-transparent text-sm font-medium rounded-md text-red-700 bg-red-100 hover:bg-red-200 dark:bg-red-900 dark:text-red-300 dark:hover:bg-red-800";
                        deleteBtn.onclick = () => promptDeleteFile(data._id, data.delete_token);
                        elements.resultButtons.appendChild(deleteBtn);
                    }
                }
            }
            
            // ... (其他函式不變)

            // --- 初始執行 ---
            updateThemeIcons(document.documentElement.classList.contains('dark'));

            const shareId = new URLSearchParams(window.location.search).get('share_id');
            if (shareId) {
                showShareView(shareId);
            }
            updateStorageStats();
        });
    </script>
