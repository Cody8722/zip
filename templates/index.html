<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多功能線上壓縮工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .log-box { font-family: 'Courier New', Courier, monospace; }
        .tab-button { transition: all 0.3s; }
        .tab-button.active { border-color: #3b82f6; color: #3b82f6; background-color: #eff6ff; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input:disabled, fieldset:disabled input, fieldset:disabled select {
            background-color: #f3f4f6;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <div class="container mx-auto p-4 md:p-8 max-w-4xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900">多功能線上壓縮工具</h1>
            <p class="text-gray-600 mt-2">安全地對您的檔案進行多層壓縮與解壓縮。</p>
        </header>

        <main class="bg-white rounded-lg shadow-lg p-6 md:p-8">
            <!-- 主要操作介面 (預設顯示) -->
            <div id="main-view">
                <!-- 功能分頁 -->
                <div class="mb-6 border-b border-gray-200">
                    <nav class="-mb-px flex space-x-6" aria-label="Tabs">
                        <button id="tab-compress" class="tab-button active whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm">壓縮</button>
                        <button id="tab-decompress" class="tab-button text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-3 px-1 border-b-2 font-medium text-sm">解壓縮</button>
                    </nav>
                </div>

                <!-- 壓縮區塊 -->
                <div id="compress-section">
                    <form id="compress-form">
                        <fieldset class="space-y-4">
                            <div class="mb-4">
                                <label for="file-compress" class="block text-sm font-medium text-gray-700 mb-2">1. 選擇檔案:</label>
                                <input id="file-compress" name="file" type="file" required class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4">
                                <div>
                                    <label for="iterations" class="block text-sm font-medium text-gray-700">2. 壓縮次數:</label>
                                    <input type="number" id="iterations" name="iterations" value="5" min="1" max="100" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                                </div>
                                <div>
                                    <label for="formats" class="block text-sm font-medium text-gray-700">3. 格式順序:</label>
                                    <input type="text" id="formats" name="formats" value="zip,7z,targz" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-2">4. 一般加密規則:</label>
                                <div class="space-y-2">
                                    <div class="flex items-center"><input id="encrypt-odd" name="encrypt_mode" type="radio" value="odd" checked class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500"><label for="encrypt-odd" class="ml-3 block text-sm text-gray-900">加密所有奇數層 (1, 3, 5...)</label></div>
                                    <div class="flex items-center"><input id="encrypt-manual" name="encrypt_mode" type="radio" value="manual" class="h-4 w-4 text-blue-600 border-gray-300 focus:ring-blue-500"><label for="encrypt-manual" class="ml-3 block text-sm text-gray-900">手動指定層數:</label><input type="text" id="manual_layers" name="manual_layers" placeholder="例如: 2,4" class="ml-2 block w-full md:w-auto rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm"></div>
                                </div>
                            </div>
                        </fieldset>

                        <fieldset id="master-password-fieldset" class="mt-6 border-t pt-4 space-y-4">
                            <legend class="text-sm font-medium text-gray-700">5. 特殊加密設定 (選填)</legend>
                            <div class="flex items-start">
                                 <div class="flex items-center h-5">
                                    <input id="use_master_pass" name="use_master_pass" type="checkbox" class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                                </div>
                                <div class="ml-3 text-sm">
                                    <label for="use_master_pass" class="font-medium text-gray-800">啟用特殊密碼</label>
                                    <p class="text-gray-500">在固定間隔使用您指定的密碼進行加密。</p>
                                </div>
                            </div>
                            <div id="master-password-inputs" class="space-y-4 hidden">
                                 <div>
                                    <label for="master_password" class="block text-sm font-medium text-gray-700">您的特殊密碼:</label>
                                    <input type="password" id="master_password" name="master_password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                                </div>
                                <div>
                                    <label for="master_password_interval" class="block text-sm font-medium text-gray-700">間隔層數 (每 N 層使用一次):</label>
                                    <input type="number" id="master_password_interval" name="master_password_interval" value="10" min="2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500">
                                </div>
                            </div>
                        </fieldset>

                        <div class="mt-6 text-center"><button type="submit" class="w-full md:w-auto inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-transform transform hover:scale-105">開始壓縮</button></div>
                    </form>
                </div>
                
                <div id="decompress-section" class="hidden">
                    <p class="text-center text-gray-600 p-8">請使用分享連結來進行解壓縮。</p>
                </div>
            </div>
            
            <div id="progress-section" class="hidden fade-in mt-8">
                <h2 class="text-2xl font-semibold mb-4 border-b pb-2">處理進度</h2>
                <div class="mb-4">
                    <div class="flex justify-between mb-1"><span id="progress-status" class="text-base font-medium text-gray-700">處理中...</span><span id="progress-percentage" class="text-sm font-medium text-gray-700">0%</span></div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5"><div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div></div>
                </div>
                <div class="text-center my-4">
                    <button id="cancel-button" class="hidden w-full md:w-auto inline-flex justify-center items-center px-4 py-2 border border-red-300 text-sm font-medium rounded-md shadow-sm text-red-700 bg-red-100 hover:bg-red-200">取消操作</button>
                </div>
                <div class="mt-4"><label for="log-box" class="block text-sm font-medium text-gray-700">執行日誌:</label><div id="log-box" class="log-box mt-1 h-48 bg-gray-900 text-white text-sm rounded-md p-3 overflow-y-auto whitespace-pre-wrap"></div></div>
                <div id="result-section" class="hidden fade-in mt-6 p-4 bg-blue-50 rounded-lg text-center">
                    <h3 id="result-title" class="text-lg font-medium text-blue-800">任務完成！</h3>
                    <div id="result-buttons" class="mt-4 flex flex-col md:flex-row justify-center items-center gap-4"></div>
                </div>
            </div>

            <div id="share-view-section" class="hidden">
                <h2 class="text-2xl font-semibold mb-2 text-gray-900">一鍵解壓縮分享</h2>
                <p class="text-gray-600 mb-6" id="share-filename">正在準備檔案...</p>
                
                <div id="share-master-pass-prompt" class="hidden mb-4 p-4 bg-yellow-50 border-l-4 border-yellow-400">
                    <label for="share-master-password" class="block text-sm font-medium text-yellow-800">⚠️ 此檔案需要特殊密碼</label>
                    <p class="text-sm text-yellow-700 mt-1">請向分享者索取，並在此輸入：</p>
                    <input type="password" id="share-master-password" class="mt-2 block w-full rounded-md border-gray-300 shadow-sm focus:border-yellow-500 focus:ring-yellow-500">
                </div>
                
                <div class="text-center">
                    <button id="start-share-decompress-btn" class="w-full inline-flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-green-600 hover:bg-green-700">
                        <svg class="w-5 h-5 mr-2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm.75-13a.75.75 0 00-1.5 0v5.5a.75.75 0 00.22.53l2.5 2.5a.75.75 0 001.06-1.06L10.75 10.19V5z" clip-rule="evenodd" /></svg>
                        開始解壓縮並準備下載
                    </button>
                </div>
            </div>
        </main>
        <footer class="text-center mt-8 text-sm text-gray-500">
             <p>所有檔案將永久儲存於 MongoDB 資料庫中 (免費額度 512MB)。</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const elements = {
                mainView: document.getElementById('main-view'),
                progressSection: document.getElementById('progress-section'),
                shareView: document.getElementById('share-view-section'),
                compressForm: document.getElementById('compress-form'),
                cancelButton: document.getElementById('cancel-button'),
                logBox: document.getElementById('log-box'),
                progressBar: document.getElementById('progress-bar'),
                progressPercentage: document.getElementById('progress-percentage'),
                progressStatus: document.getElementById('progress-status'),
                resultSection: document.getElementById('result-section'),
                resultTitle: document.getElementById('result-title'),
                resultButtons: document.getElementById('result-buttons'),
                useMasterPassCheckbox: document.getElementById('use_master_pass'),
                masterPassInputs: document.getElementById('master-password-inputs'),
                tabs: { compress: document.getElementById('tab-compress'), decompress: document.getElementById('tab-decompress') },
                sections: { compress: document.getElementById('compress-section'), decompress: document.getElementById('decompress-section') },
                share: {
                    filename: document.getElementById('share-filename'),
                    masterPassPrompt: document.getElementById('share-master-pass-prompt'),
                    masterPassInput: document.getElementById('share-master-password'),
                    startBtn: document.getElementById('start-share-decompress-btn')
                }
            };
            let currentTaskId = null;

            // --- 事件監聽 ---
            Object.keys(elements.tabs).forEach(mode => {
                elements.tabs[mode].addEventListener('click', () => {
                    Object.keys(elements.tabs).forEach(m => {
                        elements.tabs[m].classList.toggle('active', m === mode);
                        elements.sections[m].classList.toggle('hidden', m !== mode);
                    });
                });
            });
            
            elements.useMasterPassCheckbox.addEventListener('change', () => {
                elements.masterPassInputs.classList.toggle('hidden', !elements.useMasterPassCheckbox.checked);
            });

            elements.compressForm.addEventListener('submit', (e) => {
                e.preventDefault();
                startTask('/compress', new FormData(elements.compressForm));
            });
            
            elements.cancelButton.addEventListener('click', async () => {
                if (currentTaskId) {
                    await fetch(`/cancel/${currentTaskId}`, { method: 'POST' });
                }
            });

            // --- 函式 ---
            function startTask(endpoint, body) {
                elements.mainView.classList.add('hidden');
                elements.shareView.classList.add('hidden');
                elements.progressSection.classList.remove('hidden');
                elements.resultSection.classList.add('hidden');
                elements.cancelButton.classList.remove('hidden');
                elements.logBox.innerHTML = '';
                elements.progressBar.style.width = '0%';
                elements.progressPercentage.textContent = '0%';
                elements.progressStatus.textContent = '處理中...';

                fetch(endpoint, { method: 'POST', body })
                    .then(response => response.ok ? response.json() : response.json().then(err => Promise.reject(err)))
                    .then(data => {
                        if (data.task_id) {
                            currentTaskId = data.task_id;
                            checkStatus(currentTaskId);
                        } else {
                            throw new Error('無法取得任務 ID');
                        }
                    })
                    .catch(error => {
                        elements.logBox.innerHTML = `錯誤: ${error.error || error.message}`;
                        elements.progressStatus.textContent = '失敗';
                        elements.cancelButton.classList.add('hidden');
                    });
            }

            async function checkStatus(taskId) {
                try {
                    const response = await fetch(`/status/${taskId}`);
                    if (!response.ok) return;
                    const data = await response.json();
                    
                    elements.progressBar.style.width = `${data.progress || 0}%`;
                    elements.progressPercentage.textContent = `${data.progress || 0}%`;
                    elements.logBox.innerHTML = (data.logs || []).join('\n');
                    elements.logBox.scrollTop = elements.logBox.scrollHeight;

                    const finalStates = ['完成', '失敗', '已取消'];
                    if (finalStates.includes(data.status)) {
                        elements.progressStatus.textContent = data.status;
                        elements.resultTitle.textContent = `任務${data.status}！`;
                        elements.resultSection.classList.remove('hidden');
                        if(data.status === '完成') displayResults(data);
                        elements.cancelButton.classList.add('hidden');
                        currentTaskId = null;
                    } else {
                        setTimeout(() => checkStatus(taskId), 2000);
                    }
                } catch (error) {
                     elements.logBox.innerHTML += `\n檢查狀態時發生錯誤。`;
                }
            }
            
            function displayResults(data) {
                elements.resultButtons.innerHTML = '';
                const isCompress = data.type === 'compress';
                
                // 自動下載解壓縮結果
                if (!isCompress && data.result_file_id) {
                    elements.logBox.innerHTML += '\n\n日誌: 正在自動為您下載檔案...';
                    window.location.href = `/download/${data._id}`;
                }

                const downloadFileBtn = document.createElement('a');
                downloadFileBtn.href = `/download/${data._id}`;
                downloadFileBtn.textContent = `下載檔案 (${data.result_filename})`;
                downloadFileBtn.className = `w-full md:w-auto inline-flex items-center justify-center px-5 py-2 border border-transparent text-sm font-medium rounded-md text-white ${isCompress ? 'bg-blue-600' : 'bg-green-600'}`;
                elements.resultButtons.appendChild(downloadFileBtn);

                if (isCompress) {
                    elements.resultSection.className = 'fade-in mt-6 p-4 bg-blue-50 rounded-lg text-center';
                    elements.resultTitle.className = 'text-lg font-medium text-blue-800';
                    if (data.password_file_content) {
                        const shareBtn = document.createElement('button');
                        shareBtn.innerHTML = `產生分享連結`;
                        shareBtn.className = "w-full md:w-auto inline-flex items-center justify-center px-5 py-2 border border-transparent text-sm font-medium rounded-md text-yellow-800 bg-yellow-100 hover:bg-yellow-200";
                        shareBtn.onclick = (e) => displayShareLink(e, data);
                        elements.resultButtons.appendChild(shareBtn);
                    }
                }
            }

            function displayShareLink(event, data) {
                const shareUrl = `${window.location.origin}${window.location.pathname}?share_id=${data._id}`;
                const urlContainer = document.createElement('div');
                urlContainer.className = 'mt-4 p-2 bg-gray-100 rounded-md flex items-center gap-2 w-full';
                const urlInput = document.createElement('input');
                urlInput.type = 'text'; urlInput.value = shareUrl; urlInput.readOnly = true;
                urlInput.className = 'flex-grow bg-transparent border-none text-sm p-1';
                const copyButton = document.createElement('button');
                copyButton.textContent = '複製';
                copyButton.className = 'text-sm bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded-md';
                copyButton.onclick = () => {
                    urlInput.select();
                    document.execCommand('copy');
                    copyButton.textContent = '已複製!';
                    setTimeout(() => { copyButton.textContent = '複製'; }, 2000);
                };
                urlContainer.appendChild(urlInput);
                urlContainer.appendChild(copyButton);
                elements.resultButtons.appendChild(urlContainer);
                event.target.closest('button').disabled = true;
            }
            
            async function showShareView(shareId) {
                elements.mainView.classList.add('hidden');
                elements.shareView.classList.remove('hidden');
                try {
                    const response = await fetch(`/status/${shareId}`);
                    if (!response.ok) throw new Error('找不到分享的檔案或連結已過期。');
                    const data = await response.json();
                    if (data.type !== 'compress' || !data.result_filename) throw new Error('此連結不是一個有效的分享連結。');

                    elements.share.filename.textContent = `準備解壓縮檔案: ${data.result_filename}`;
                    
                    const needsMasterPass = data.password_file_content && data.password_file_content.includes('(特殊密碼層)');
                    if (needsMasterPass) {
                        elements.share.masterPassPrompt.classList.remove('hidden');
                    }

                    elements.share.startBtn.onclick = () => {
                        const body = JSON.stringify({
                            master_password: needsMasterPass ? elements.share.masterPassInput.value : null
                        });
                        startTask(`/start-shared-decompression/${shareId}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body
                        });
                    };
                } catch (error) {
                    elements.shareView.innerHTML = `<div class="p-4 bg-red-100 text-red-700 rounded-lg text-center">${error.message}</div>`;
                }
            }
            
            // --- 初始執行 ---
            const shareId = new URLSearchParams(window.location.search).get('share_id');
            if (shareId) {
                showShareView(shareId);
            }
        });
    </script>
</body>
</html>
